<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Potion Lab</title>
    <link rel="stylesheet" href="./src/style.css" />
    <script type="module" src="./dist/app.js"></script>
  </head>
  <body>
    <h1>Potion Lab 🧙🏻‍♀️</h1>
    <main>
      <div class="ingredients">
        <h3>Ingredients</h3>
        <div class="ingredients-cards"></div>
      </div>

      <div class="main-section">
        <div class="brewing">
          <div class="brewing-buttons">
            <button disabled class="brew-button">Brew 🍵</button>
            <button class="clear-button">Clear 🧽</button>
          </div>
          <div class="selected-ingredients"></div>
        </div>

        <div class="potions">
          <div>
            <img src="./public/1.png" id="pot_1" alt="" />
          </div>
          <div>
            <img src="./public/2.png" id="pot_2" alt="" />
          </div>
          <div>
            <img src="./public/3.png" id="pot_3" alt="" />
          </div>
          <div>
            <img src="./public/4.png" id="pot_4" alt="" />
          </div>
          <div>
            <img src="./public/5.png" id="pot_5" alt="" />
          </div>
          <div>
            <img src="./public/6.png" id="pot_6" alt="" />
          </div>
          <div>
            <img src="./public/7.png" id="pot_7" alt="" />
          </div>
          <div>
            <img src="./public/8.png" id="pot_8" alt="" />
          </div>
          <div>
            <img src="./public/9.png" id="pot_9" alt="" />
          </div>
          <div>
            <img src="./public/10.png" id="pot_10" alt="" />
          </div>
        </div>
        <div class="hints">Hover potion to see hint!</div>
      </div>
    </main>
  </body>
</html>
